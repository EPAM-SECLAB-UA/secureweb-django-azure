name: Deploy Django to Azure with PostgreSQL

on:
  push:
    branches: [ main, feature/infrastructure-update ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: django-app-budget-1752082786
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🧪 Run Django checks
      run: |
        # python manage.py check --deploy
      env:
        SECRET_KEY: 'github-actions-test-key'
        DEBUG: 'False'
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_HOST: ${{ secrets.DB_HOST }}
        
    - name: 🧹 Prepare deployment
      run: |
        find . -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.pyc" -delete
        rm -rf .git .gitignore README.md docs/ images/ logs/ .env* *.log .vscode/ .devcontainer/
        
    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: '.'
        
    - name: ⚙️ Configure App Settings with Database
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az webapp config appsettings set \
            --resource-group django-app-budget-rg \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --settings \
              DJANGO_SETTINGS_MODULE="project_portfolio.settings" \
              SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              DEBUG="False" \
              DJANGO_ALLOWED_HOSTS="${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net,.azurewebsites.net,localhost" \
              DB_NAME="${{ secrets.DB_NAME }}" \
              DB_USER="${{ secrets.DB_USER }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              DB_HOST="${{ secrets.DB_HOST }}" \
              DB_PORT="5432" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="true" \
              PYTHONPATH="/home/site/wwwroot"
      env:
        AZURE_CREDENTIALS: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        
    - name: 🏥 Health check
      run: |
        echo "🏥 Waiting for application to start..."
        sleep 90
        
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        
        for i in {1..8}; do
          echo "🔍 Health check attempt $i/8"
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Application is healthy!"
            echo "🌐 URL: $APP_URL"
            echo "🛡️ Admin: $APP_URL/admin/"
            break
          fi
          
          if [ $i -lt 8 ]; then
            echo "⏳ Waiting 30 seconds..."
            sleep 30
          fi
        done
        
    - name: 📊 Deployment Summary
      if: always()
      run: |
        echo "## 🎉 Django + PostgreSQL Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| 🌐 **Application** | https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
        echo "| 🛡️ **Admin Panel** | https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/admin/ |" >> $GITHUB_STEP_SUMMARY
        echo "| 🗄️ **Database** | PostgreSQL on Azure |" >> $GITHUB_STEP_SUMMARY
        echo "| 🐍 **Python** | ${{ env.PYTHON_VERSION }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🌿 **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
