name: Deploy Django to Azure

on:
  push:
    branches: [ feature/infrastructure-update, main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: django-app-budget-1752082786
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 📦 Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: 📋 Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🧪 Run Django system checks
      run: |
        echo "Running Django system checks..."
        python manage.py check --deploy
      env:
        SECRET_KEY: 'github-actions-build-key'
        DEBUG: 'False'
        
    - name: 🧹 Clean up for deployment
      run: |
        echo "Cleaning up files for deployment..."
        
        # Remove development and CI files
        rm -rf .git .gitignore .github
        rm -rf __pycache__ */__pycache__ */*/__pycache__
        find . -name "*.pyc" -delete
        find . -name "*.pyo" -delete
        rm -rf .pytest_cache .coverage htmlcov
        rm -rf docs/ images/ logs/ .env* *.log
        rm -rf .vscode/ .devcontainer/
        rm -rf azure-deploy*.sh cleanup*.sh deploy*.sh
        rm -rf *.md LICENSE
        
        # Keep only essential files
        echo "Files remaining after cleanup:"
        find . -type f | head -20
        
    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: '.'
        
    - name: ⏳ Wait for deployment
      run: |
        echo "Waiting for Azure deployment to complete..."
        sleep 90
        
    - name: 🏥 Health check
      id: health-check
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "🔍 Testing application health at: $APP_URL"
        
        for attempt in {1..8}; do
          echo "🔄 Health check attempt $attempt/8"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
          echo "📊 HTTP Status Code: $HTTP_CODE"
          
          case $HTTP_CODE in
            200)
              echo "✅ Application is healthy and responding!"
              echo "app-status=healthy" >> $GITHUB_OUTPUT
              break
              ;;
            503)
              echo "⏳ Application is starting (503 Service Unavailable)"
              ;;
            000)
              echo "❌ Network error or timeout"
              ;;
            *)
              echo "⚠️ Unexpected HTTP status: $HTTP_CODE"
              ;;
          esac
          
          if [ $attempt -lt 8 ]; then
            echo "⏳ Waiting 45 seconds before next attempt..."
            sleep 45
          fi
        done
        
        echo "app-url=$APP_URL" >> $GITHUB_OUTPUT
        
    - name: 📊 Create deployment summary
      if: always()
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        
        {
          echo "## 🎉 Django Deployment Summary"
          echo ""
          echo "| 📋 Parameter | 📄 Value |"
          echo "|--------------|-----------|"
          echo "| 🌐 **Application URL** | [$APP_URL]($APP_URL) |"
          echo "| 📦 **App Service** | \`${{ env.AZURE_WEBAPP_NAME }}\` |"
          echo "| 🐍 **Python Version** | \`${{ env.PYTHON_VERSION }}\` |"
          echo "| 🌿 **Branch** | \`${{ github.ref_name }}\` |"
          echo "| 📝 **Commit** | \`${{ github.sha }}\` |"
          echo "| 👤 **Author** | @${{ github.actor }} |"
          echo "| ⏰ **Deploy Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
          echo "| 🏥 **Health Status** | ${{ steps.health-check.outputs.app-status || 'unknown' }} |"
          echo ""
          echo "### 🔧 Quick Actions:"
          echo "- 🌐 [Open Application]($APP_URL)"
          echo "- 📊 [Azure Portal](https://portal.azure.com)"
          echo "- 📝 [App Service Logs](https://portal.azure.com/#@/resource/subscriptions/f7dc8823-4f06-4346-9de0-badbe6273a54/resourceGroups/django-app-budget-rg/providers/Microsoft.Web/sites/${{ env.AZURE_WEBAPP_NAME }}/logStream)"
          echo ""
          echo "### 📋 Next Steps:"
          echo "1. ✅ Verify the application works at the URL above"
          echo "2. ⚙️ Configure environment variables if needed"
          echo "3. 📊 Monitor application performance"
          echo "4. 🔍 Check logs if issues occur"
        } >> $GITHUB_STEP_SUMMARY
        
    - name: 🎯 Final status
      run: |
        echo "🎉 Deployment workflow completed!"
        echo "🌐 Application URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "📊 Check the summary above for details"
